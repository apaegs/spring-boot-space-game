spring.application.name=spring-boot-space-game

# Laddar lokala .env (gitignored) om filen finns. Format: KEY=value (properties-stil).
spring.config.import=optional:file:.env[.properties]

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# World tick interval. This is a game-design choice — same value for every
# deployment, every player, every dev. Not a per-machine knob. The right
# answer here is whatever makes the game feel right, not whatever the
# fastest hardware can handle.
#
# Tests bypass the scheduler entirely (test-resources sets this to ~1 hour
# and calls TickService.advanceTick() directly), so this number doesn't
# affect test runtime.
game.tick.interval-ms=3000
