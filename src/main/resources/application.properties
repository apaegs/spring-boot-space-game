spring.application.name=spring-boot-space-game

# Laddar lokala .env (gitignored) om filen finns. Format: KEY=value (properties-stil).
spring.config.import=optional:file:.env[.properties]

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# World tick interval. 60s is the v1 default; dev environments can shorten it via
# .env (e.g. GAME_TICK_INTERVAL_MS=2000 for snappy iteration). Tests bypass the
# scheduler and call TickService.advanceTick() directly for determinism.
game.tick.interval-ms=60000
