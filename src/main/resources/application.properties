spring.application.name=spring-boot-space-game

# Laddar lokala .env (gitignored) om filen finns. Format: KEY=value (properties-stil).
spring.config.import=optional:file:.env[.properties]

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# World tick interval. 15s gives a noticeable heartbeat while a player is
# actively at the keyboard, without spamming the server when nobody's around.
# Override via .env (e.g. GAME_TICK_INTERVAL_MS=2000 for very fast iteration,
# or 60000+ if you want slow strategy-game cadence). Tests bypass the
# scheduler and call TickService.advanceTick() directly for determinism.
game.tick.interval-ms=15000
