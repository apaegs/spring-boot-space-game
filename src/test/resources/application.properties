# Test-only overrides — Spring Boot loads this on top of the main properties
# when the classpath is the test classpath.

# Effectively disable the @Scheduled tick during integration tests. Tests that
# need to advance the tick call TickService.advanceTick() directly for
# determinism. A real scheduler firing in the background races with
# cleanup.sql for the world_state row (PSQLException: deadlock detected) or
# bumps currentTick past what a test expects (flaky assertions).
# 1 hour is a safe upper bound for any test run.
game.tick.interval-ms=3600000
