name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Workflow-level least-privilege. Both jobs only build and test — neither
# needs to write back to the repo, push tags, or update releases — so the
# default GITHUB_TOKEN scope (which may include write on contents/PRs
# depending on repo settings) is more than necessary. Bump per-job if a
# job later needs more.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Actions are pinned to commit SHAs (supply-chain integrity — a tag like
      # @v4 can be retargeted by the action's maintainer, a SHA can't).
      # When updating, find the SHA via `gh api repos/<owner>/<action>/git/ref/tags/<tag>`.
      # `persist-credentials: false` keeps the auto-generated GITHUB_TOKEN out of
      # .git/config — we only build + test, no `git push`, so the token would
      # only be a risk surface if a later step were compromised.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v4.7.1
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        # -Dskip.frontend.build=true: the separate `frontend` job below
        # runs lint + build on the SPA. Doing it again here would just
        # add ~30s of duplicate pnpm work to the Java pipeline.
        run: ./mvnw -B verify -Dskip.frontend.build=true

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v4.1.0
        with:
          # pnpm/action-setup can read `packageManager` from package.json, but
          # only if pointed at the right one — we keep package.json under
          # frontend/, not at repo root.
          package_json_file: frontend/package.json

      - name: Set up Node 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v4.7.1
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm run test

      - name: Build
        run: pnpm run build
