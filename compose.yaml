services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-spacegame}
      POSTGRES_USER: ${POSTGRES_USER:-spacegame}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-spacegame}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-spacegame} -d $${POSTGRES_DB:-spacegame}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
